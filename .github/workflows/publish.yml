name: Publish VS Code Extension to Release

on:
  push:
    branches: [ master ]

  # 手动触发（无需输入版本号）
  workflow_dispatch:
    inputs:
      create_draft:
        description: '是否创建为 Draft Release（草稿）？'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm
        
      - name: Install dependencies
        run: pnpm install
        

      - name: Install vsce
        run: pnpm install -g @vscode/vsce


      - name: Package VS Code Extension
        run: vsce package

      - name: Get version from package.json
        id: get_version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: ${{ inputs.create_draft || false }}
          prerelease: false
          files: |
            *.vsix
          body: |
            ## VS Code Extension Release v${{ steps.get_version.outputs.VERSION }}

            - Automatically packaged using GitHub Actions
            - Trigger: ${{ github.event_name == 'push' && 'Push to master' || 'Manual trigger' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}